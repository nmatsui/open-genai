# Open GENAI 本番用 compose（LGWAN 想定 / TLS リバースプロキシ集約）。
#
# 使い方（本番 TLS）:
#   cp .env.prod.example .env.prod
#   # .env.prod の PUBLIC_URL 等を編集
#   # 組織 CA 発行の証明書を proxy/certs/{fullchain.pem,privkey.pem} に配置
#   docker compose -f docker-compose.prod.yml --env-file .env.prod up --build
#
# 使い方（閉域検証: HTTP のみ・自己署名不要・ポート 80）:
#   cp .env.prod.example .env.prod
#   # PUBLIC_URL=http://localhost, PROXY_HTTP_PORT=80 等を編集
#   docker compose -f docker-compose.prod.yml -f docker-compose.verify.yml \
#     --env-file .env.prod up --build
#
# 方針:
# - ユーザに公開するポートは proxy のみ（本番: 80/443、検証: 80 のみ）。
# - web / backend / keycloak / 各 AI アプリ / qdrant はホストにポート公開せず、
#   Docker 内部ネットワークでのみ到達（proxy がパスで振り分ける）。
# - フロントの API 参照は相対パス /api（genai-web 無改修・.env 設定のみ）。

services:
  # 唯一の公開点: TLS を終端し /、/api/、/kc/ を内部サービスへ振り分ける
  proxy:
    image: nginx:1.27-alpine
    container_name: open-genai-proxy
    ports:
      - "${PROXY_HTTP_PORT:-80}:80"
      - "${PROXY_HTTPS_PORT:-443}:443"
    volumes:
      - ./proxy/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./proxy/certs:/etc/nginx/certs:ro
    depends_on:
      - web
      - backend
      - keycloak
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: open-genai-backend
    # ホストにポート公開しない（proxy 経由のみ）
    expose:
      - "8000"
    environment:
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      - OPENAI_BASE_URL=${OPENAI_BASE_URL:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-ollama}
      - DEFAULT_MODEL=${DEFAULT_MODEL:-qwen2.5:7b}
      - DB_PATH=/data/open-genai.db
      # 監査ログ / チャット履歴分離
      - AUDIT_ENABLED=${AUDIT_ENABLED:-true}
      - AUDIT_DB_PATH=/data/audit.db
      - AUDIT_STORE_CONTENT=${AUDIT_STORE_CONTENT:-true}
      - AUDIT_MAX_CONTENT_CHARS=${AUDIT_MAX_CONTENT_CHARS:-8000}
      - AUDIT_RETENTION_DAYS=${AUDIT_RETENTION_DAYS:-1825}
      - LEGACY_CHAT_OWNER=${LEGACY_CHAT_OWNER:-}
      # AI アプリ連携先
      - RAG_APP_URL=${RAG_APP_URL:-http://rag-app:8001/invoke}
      - RAG_API_KEY=${RAG_API_KEY:-local-rag-key}
      - AUDIT_APP_URL=${AUDIT_APP_URL:-http://audit-app:8005/invoke}
      - USERMGMT_APP_URL=${USERMGMT_APP_URL:-http://usermgmt-app:8006/invoke}
      - MODELPOLICY_APP_URL=${MODELPOLICY_APP_URL:-http://modelpolicy-app:8007/invoke}
      - POLICY_DB_PATH=/data/policy.db
      - NGWORD_APP_URL=${NGWORD_APP_URL:-http://ngword-app:8008/invoke}
      - NGWORD_DB_PATH=/data/ngwords.db
      - PROMPT_APP_URL=${PROMPT_APP_URL:-http://prompt-app:8009/invoke}
      # 内部サービス間署名の共有鍵（x-user-* 偽装対策）。全 exApp と同一値・必須。
      - INTERNAL_SIGNING_SECRET=${INTERNAL_SIGNING_SECRET:?INTERNAL_SIGNING_SECRET を設定してください}
      # 成果物取得(SSRF 対策): 許可ホスト(カンマ区切り)とサイズ上限。既知の生成元のみ許可を推奨。
      - ARTIFACT_FETCH_ALLOWED_HOSTS=${ARTIFACT_FETCH_ALLOWED_HOSTS:-}
      - ARTIFACT_MAX_BYTES=${ARTIFACT_MAX_BYTES:-52428800}
      # 成果物ファイルの再ホスト先（自前 S3 互換: SeaweedFS）
      # S3_PUBLIC_ENDPOINT は利用者がインターネットから到達する公開URLを指定すること
      - S3_ENDPOINT_URL=${S3_ENDPOINT_URL:-http://seaweedfs:8333}
      - S3_PUBLIC_ENDPOINT=${S3_PUBLIC_ENDPOINT:?S3_PUBLIC_ENDPOINT（公開URL）を設定してください}
      - S3_BUCKET=${S3_BUCKET:-open-genai}
      - S3_ACCESS_KEY=${S3_ACCESS_KEY:?S3_ACCESS_KEY を設定してください}
      - S3_SECRET_KEY=${S3_SECRET_KEY:?S3_SECRET_KEY を設定してください}
      - S3_PRESIGN_EXPIRY=${S3_PRESIGN_EXPIRY:-86400}
      - DIFY_APP_URL=${DIFY_APP_URL:-http://dify-app:8004/invoke}
      # --- 本番 URL（すべて proxy(443) 経由の公開 URL / 相対 /api）---
      - PUBLIC_BASE_URL=${PUBLIC_URL}/api
      - FRONTEND_URL=${PUBLIC_URL}
      - APP_JWT_SECRET=${APP_JWT_SECRET:?APP_JWT_SECRET を .env.prod に設定してください}
      - SAML_SP_ENTITY_ID=${PUBLIC_URL}/api/auth/saml/metadata
      - SAML_SP_ACS_URL=${PUBLIC_URL}/api/auth/saml/acs
      - SAML_SP_SLS_URL=${PUBLIC_URL}/api/auth/saml/sls
      # backend からは内部ネットワークで Keycloak(relative /kc) を参照
      - SAML_IDP_METADATA_URL=${SAML_IDP_METADATA_URL:-http://keycloak:8080/kc/realms/open-genai/protocol/saml/descriptor}
    volumes:
      - backend_data:/data
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      rag-app:
        condition: service_started
      whisper-app:
        condition: service_started
      sd-app:
        condition: service_started
      dify-app:
        condition: service_started
      audit-app:
        condition: service_started
      usermgmt-app:
        condition: service_started
      modelpolicy-app:
        condition: service_started
      ngword-app:
        condition: service_started
      prompt-app:
        condition: service_started
      seaweedfs:
        condition: service_healthy
      keycloak:
        condition: service_started
    restart: unless-stopped

  keycloak:
    image: quay.io/keycloak/keycloak:26.0
    container_name: open-genai-keycloak
    # 本番モードで起動（dev モードの start-dev は使わない）。
    # TLS は proxy で終端し、KC には X-Forwarded-* を信頼させる。
    command: ["start", "--import-realm"]
    expose:
      - "8080"
    environment:
      - KC_BOOTSTRAP_ADMIN_USERNAME=${KEYCLOAK_ADMIN:-admin}
      - KC_BOOTSTRAP_ADMIN_PASSWORD=${KEYCLOAK_ADMIN_PASSWORD:?KEYCLOAK_ADMIN_PASSWORD を設定してください}
      # 公開 URL は proxy の /kc。フル URL で指定しないと SAML メタデータに /kc が付かない
      - KC_HOSTNAME=${PUBLIC_URL}/kc
      - KC_HTTP_RELATIVE_PATH=/kc
      - KC_HOSTNAME_STRICT=false
      - KC_HTTP_ENABLED=true
      # proxy からの X-Forwarded-* を信頼（TLS は proxy で終端）
      - KC_PROXY_HEADERS=xforwarded
      # 本番の永続DBは外部RDBを強く推奨（既定の組込H2は本番非推奨）。
      # 例: KC_DB=postgres, KC_DB_URL/KC_DB_USERNAME/KC_DB_PASSWORD を設定し、
      #     初回のみ `kc.sh build` 済みイメージ（--optimized）で運用する。
      - KC_DB=${KC_DB:-dev-file}
    volumes:
      - ./keycloak/import:/opt/keycloak/data/import:ro
      - keycloak_data:/opt/keycloak/data
    restart: unless-stopped

  web:
    build:
      context: ./genai-web
      dockerfile: Dockerfile.local
    container_name: open-genai-web
    expose:
      - "5173"
    environment:
      - VITE_USE_POLLING=true
      - VITE_APP_API_ENDPOINT=/api
      - VITE_APP_TEAM_ACCESS_CONTROL_API_ENDPOINT=/api
      # proxy 経由の公開ホスト名を Vite に許可させる（例: genai.example.lg.jp）
      - VITE_ALLOWED_HOSTS=${VITE_ALLOWED_HOSTS:-true}
    volumes:
      - ./genai-web:/app
      - web_node_modules:/app/node_modules
      - web_pkg_web_node_modules:/app/packages/web/node_modules
      - web_pkg_common_node_modules:/app/packages/common/node_modules
      - web_pkg_types_node_modules:/app/packages/types/node_modules
      - web_pkg_cdk_node_modules:/app/packages/cdk/node_modules
    depends_on:
      - backend
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant:latest
    container_name: open-genai-qdrant
    expose:
      - "6333"
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped

  rag-app:
    build:
      context: .
      dockerfile: rag-app/Dockerfile
    container_name: open-genai-rag-app
    environment:
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      - OPENAI_BASE_URL=${OPENAI_BASE_URL:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-ollama}
      - QDRANT_URL=http://qdrant:6333
      - EMBED_MODEL=${EMBED_MODEL:-mxbai-embed-large}
      - RAG_MODEL=${RAG_MODEL:-gpt-oss:20b}
      - RAG_API_KEY=${RAG_API_KEY:-local-rag-key}
      - INTERNAL_SIGNING_SECRET=${INTERNAL_SIGNING_SECRET:?INTERNAL_SIGNING_SECRET を設定してください}
      - RAG_META_DB_PATH=/data/rag_meta.db
      - URL_REFRESH_INTERVAL=${URL_REFRESH_INTERVAL:-86400}
      # URL 取り込みの SSRF 対策: 生成元の既知ホストのみ許可を推奨（カンマ区切り）
      - URL_FETCH_ALLOWED_HOSTS=${URL_FETCH_ALLOWED_HOSTS:-}
    volumes:
      - rag_app_data:/data
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - qdrant
    restart: unless-stopped

  whisper-app:
    build: ./whisper-app
    container_name: open-genai-whisper-app
    environment:
      - RAG_API_KEY=${RAG_API_KEY:-local-rag-key}
      - WHISPER_MODEL=${WHISPER_MODEL:-medium}
      - WHISPER_COMPUTE=${WHISPER_COMPUTE:-int8}
    volumes:
      - whisper_cache:/cache
    restart: unless-stopped

  sd-app:
    build: ./sd-app
    container_name: open-genai-sd-app
    environment:
      - RAG_API_KEY=${RAG_API_KEY:-local-rag-key}
      - SD_API_URL=${SD_API_URL:-http://host.docker.internal:7860}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  dify-app:
    build: ./dify-app
    container_name: open-genai-dify-app
    environment:
      - RAG_API_KEY=${RAG_API_KEY:-local-rag-key}
      - DIFY_BASE_URL=${DIFY_BASE_URL:-}
    volumes:
      - dify_app_data:/data
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  audit-app:
    build: ./audit-app
    container_name: open-genai-audit-app
    environment:
      - RAG_API_KEY=${RAG_API_KEY:-local-rag-key}
      - AUDIT_DB_PATH=/data/audit.db
      - INTERNAL_SIGNING_SECRET=${INTERNAL_SIGNING_SECRET:?INTERNAL_SIGNING_SECRET を設定してください}
    volumes:
      - backend_data:/data
    restart: unless-stopped

  usermgmt-app:
    build: ./usermgmt-app
    container_name: open-genai-usermgmt-app
    environment:
      - RAG_API_KEY=${RAG_API_KEY:-local-rag-key}
      # 本番は Keycloak が relative path /kc 配下のため内部URLも /kc を含める
      - KEYCLOAK_URL=${KEYCLOAK_INTERNAL_URL:-http://keycloak:8080/kc}
      - KEYCLOAK_REALM=${KEYCLOAK_REALM:-open-genai}
      - KEYCLOAK_ADMIN=${KEYCLOAK_ADMIN:-admin}
      - KEYCLOAK_ADMIN_PASSWORD=${KEYCLOAK_ADMIN_PASSWORD:?KEYCLOAK_ADMIN_PASSWORD を設定してください}
      - INTERNAL_SIGNING_SECRET=${INTERNAL_SIGNING_SECRET:?INTERNAL_SIGNING_SECRET を設定してください}
    depends_on:
      - keycloak
    restart: unless-stopped

  modelpolicy-app:
    build: ./modelpolicy-app
    container_name: open-genai-modelpolicy-app
    environment:
      - RAG_API_KEY=${RAG_API_KEY:-local-rag-key}
      - POLICY_DB_PATH=/data/policy.db
      - INTERNAL_SIGNING_SECRET=${INTERNAL_SIGNING_SECRET:?INTERNAL_SIGNING_SECRET を設定してください}
    volumes:
      - backend_data:/data
    restart: unless-stopped

  ngword-app:
    build: ./ngword-app
    container_name: open-genai-ngword-app
    environment:
      - RAG_API_KEY=${RAG_API_KEY:-local-rag-key}
      - NGWORD_DB_PATH=/data/ngwords.db
      - INTERNAL_SIGNING_SECRET=${INTERNAL_SIGNING_SECRET:?INTERNAL_SIGNING_SECRET を設定してください}
    volumes:
      - backend_data:/data
    restart: unless-stopped

  prompt-app:
    build: ./prompt-app
    container_name: open-genai-prompt-app
    environment:
      - RAG_API_KEY=${RAG_API_KEY:-local-rag-key}
      - PROMPT_DB_PATH=/data/prompts.db
      - INTERNAL_SIGNING_SECRET=${INTERNAL_SIGNING_SECRET:?INTERNAL_SIGNING_SECRET を設定してください}
    volumes:
      - backend_data:/data
    restart: unless-stopped

  # 成果物ファイル配信用の自前オブジェクトストレージ（OSS・S3互換）。
  # 本番: 利用者がインターネットから取得するため、別途 TLS 付きの公開経路
  #       （S3_PUBLIC_ENDPOINT）へ 8333 を露出する構成にすること。
  seaweedfs:
    image: chrislusf/seaweedfs:latest
    container_name: open-genai-seaweedfs
    command: >-
      server -dir=/data -s3 -s3.port=8333
      -s3.config=/etc/seaweedfs/s3.config.json -ip.bind=0.0.0.0
    volumes:
      - seaweedfs_data:/data
      - ./seaweedfs/s3.config.json:/etc/seaweedfs/s3.config.json:ro
    healthcheck:
      # S3 API は起動直後 listen しない。403 も「応答あり」として healthy 扱う。
      # BusyBox wget は 403 で終了コード 8 ではなく 1 を返すため、HTTP ステータスで判定する。
      test: ["CMD-SHELL", "wget -S --spider http://127.0.0.1:8333/ 2>&1 | grep -qE 'HTTP/.* (403|200)'"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 25s
    restart: unless-stopped

volumes:
  backend_data:
  web_node_modules:
  web_pkg_web_node_modules:
  web_pkg_common_node_modules:
  web_pkg_types_node_modules:
  web_pkg_cdk_node_modules:
  qdrant_data:
  keycloak_data:
  whisper_cache:
  dify_app_data:
  rag_app_data:
  seaweedfs_data:
