# Open GENAI: デジタル庁 源内 (genai-web) をローカル LLM (Ollama) で動かす構成
#
#   [ブラウザ] -> web (Vite:5173) -> backend (FastAPI:8000) -> Ollama (11434)
#
# Ollama は既定でホスト側 (host.docker.internal:11434) を利用する。
# Ollama もコンテナで動かしたい場合は `--profile ollama` を付けて起動する。

services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: open-genai-backend
    ports:
      - "8000:8000"
    environment:
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      # OpenAI 互換エンドポイント（未指定なら OLLAMA_BASE_URL/v1 を使用）
      - OPENAI_BASE_URL=${OPENAI_BASE_URL:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-ollama}
      - DEFAULT_MODEL=${DEFAULT_MODEL:-qwen2.5:7b}
      - DB_PATH=/data/open-genai.db
      # --- 監査ログ（8-(1)）/ チャット履歴ユーザー別分離（6-(8)）---
      - AUDIT_ENABLED=${AUDIT_ENABLED:-true}
      - AUDIT_DB_PATH=/data/audit.db
      - AUDIT_STORE_CONTENT=${AUDIT_STORE_CONTENT:-true}
      - AUDIT_MAX_CONTENT_CHARS=${AUDIT_MAX_CONTENT_CHARS:-8000}
      - AUDIT_RETENTION_DAYS=${AUDIT_RETENTION_DAYS:-1825}
      - LEGACY_CHAT_OWNER=${LEGACY_CHAT_OWNER:-}
      # RAG「AI アプリ」連携先（Team API がここへプロキシする）
      - RAG_APP_URL=${RAG_APP_URL:-http://rag-app:8001/invoke}
      - RAG_API_KEY=${RAG_API_KEY:-local-rag-key}
      # 監査ログ参照「AI アプリ」連携先（管理者限定）
      - AUDIT_APP_URL=${AUDIT_APP_URL:-http://audit-app:8005/invoke}
      # 利用者一括管理「AI アプリ」連携先（管理者限定）
      - USERMGMT_APP_URL=${USERMGMT_APP_URL:-http://usermgmt-app:8006/invoke}
      # モデル利用制御「AI アプリ」連携先（管理者限定）と参照するポリシーDB
      - MODELPOLICY_APP_URL=${MODELPOLICY_APP_URL:-http://modelpolicy-app:8007/invoke}
      - POLICY_DB_PATH=/data/policy.db
      # 入力制限(禁止ワード/機密情報)「AI アプリ」連携先と参照するルールDB
      - NGWORD_APP_URL=${NGWORD_APP_URL:-http://ngword-app:8008/invoke}
      - NGWORD_DB_PATH=/data/ngwords.db
      # プロンプトテンプレート「AI アプリ」連携先（全ユーザー利用可）
      - PROMPT_APP_URL=${PROMPT_APP_URL:-http://prompt-app:8009/invoke}
      # Dify 連携「AI アプリ」プロキシの endpoint（アプリ登録時の endpoint に使う）
      - DIFY_APP_URL=${DIFY_APP_URL:-http://dify-app:8004/invoke}
      # --- SAML 認証 (backend = SAML SP) ---
      - APP_JWT_SECRET=${APP_JWT_SECRET:-change-me-open-genai-secret}
      - FRONTEND_URL=${FRONTEND_URL:-http://localhost:5173}
      - SAML_SP_ENTITY_ID=${SAML_SP_ENTITY_ID:-http://localhost:8000/auth/saml/metadata}
      - SAML_SP_ACS_URL=${SAML_SP_ACS_URL:-http://localhost:8000/auth/saml/acs}
      # backend(コンテナ内)から IdP メタデータを取得する URL
      - SAML_IDP_METADATA_URL=${SAML_IDP_METADATA_URL:-http://keycloak:8080/realms/open-genai/protocol/saml/descriptor}
    volumes:
      - backend_data:/data
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - rag-app
      - whisper-app
      - sd-app
      - dify-app
      - audit-app
      - usermgmt-app
      - modelpolicy-app
      - ngword-app
      - prompt-app
      - keycloak
    restart: unless-stopped

  # SAML IdP（ユーザー管理 UI 付き）
  keycloak:
    image: quay.io/keycloak/keycloak:26.0
    container_name: open-genai-keycloak
    command: ["start-dev", "--import-realm"]
    environment:
      - KC_BOOTSTRAP_ADMIN_USERNAME=${KEYCLOAK_ADMIN:-admin}
      - KC_BOOTSTRAP_ADMIN_PASSWORD=${KEYCLOAK_ADMIN_PASSWORD:-admin}
      # ブラウザ・メタデータに出る URL を localhost:8088 に固定する
      # （ホスト 8080 は他用途のため 8088 を使用）
      - KC_HOSTNAME=http://localhost:8088
      - KC_HOSTNAME_STRICT=false
      - KC_HTTP_ENABLED=true
    ports:
      - "8088:8080"
    volumes:
      - ./keycloak/import:/opt/keycloak/data/import:ro
      - keycloak_data:/opt/keycloak/data
    restart: unless-stopped

  # RAG を「行政実務用 AI アプリ」として提供するマイクロサービス
  rag-app:
    build:
      context: .
      dockerfile: rag-app/Dockerfile
    container_name: open-genai-rag-app
    environment:
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      - OPENAI_BASE_URL=${OPENAI_BASE_URL:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-ollama}
      - QDRANT_URL=http://qdrant:6333
      - EMBED_MODEL=${EMBED_MODEL:-mxbai-embed-large}
      - RAG_MODEL=${RAG_MODEL:-gpt-oss:20b}
      - RAG_API_KEY=${RAG_API_KEY:-local-rag-key}
      # フォルダ階層・アクセス権限レジストリ(SQLite)
      - FOLDERS_DB_PATH=/data/rag_folders.db
    volumes:
      - rag_app_data:/data
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - qdrant
    restart: unless-stopped

  # ベクトルデータベース
  qdrant:
    image: qdrant/qdrant:latest
    container_name: open-genai-qdrant
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped

  # 文字起こしを「AI アプリ」として提供（faster-whisper / CPU）
  whisper-app:
    build: ./whisper-app
    container_name: open-genai-whisper-app
    environment:
      - RAG_API_KEY=${RAG_API_KEY:-local-rag-key}
      - WHISPER_MODEL=${WHISPER_MODEL:-medium}
      - WHISPER_COMPUTE=${WHISPER_COMPUTE:-int8}
    volumes:
      - whisper_cache:/cache
    restart: unless-stopped

  # 画像生成を「AI アプリ」として提供（ホストの SD サーバへプロキシ）
  sd-app:
    build: ./sd-app
    container_name: open-genai-sd-app
    environment:
      - RAG_API_KEY=${RAG_API_KEY:-local-rag-key}
      # ホストで動く AUTOMATIC1111 互換 SD サーバ
      - SD_API_URL=${SD_API_URL:-http://host.docker.internal:7860}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  # Dify(ワークフロー/チャットフロー)連携を「AI アプリ」として提供する汎用プロキシ
  # 接続先(base_url)・種別は AI アプリの設定(config) でアプリ単位に指定する。
  dify-app:
    build: ./dify-app
    container_name: open-genai-dify-app
    environment:
      - RAG_API_KEY=${RAG_API_KEY:-local-rag-key}
      # 既定の Dify 接続先（任意。各 AI アプリの config で個別に上書き可能）
      - DIFY_BASE_URL=${DIFY_BASE_URL:-}
    volumes:
      # session_id -> conversation_id の対応（会話継続用）を永続化
      - dify_app_data:/data
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  # 監査ログ参照を「AI アプリ」として提供（管理者限定）。
  # backend と同じ backend_data ボリュームを共有し、audit.db を読み取り専用で参照する。
  audit-app:
    build: ./audit-app
    container_name: open-genai-audit-app
    environment:
      - RAG_API_KEY=${RAG_API_KEY:-local-rag-key}
      - AUDIT_DB_PATH=/data/audit.db
    volumes:
      # backend の監査DBを共有（WAL の -shm 参照のため rw マウント。接続は mode=ro）
      - backend_data:/data
    restart: unless-stopped

  # 利用者一括管理を「AI アプリ」として提供（管理者限定）。Keycloak Admin API と連携。
  usermgmt-app:
    build: ./usermgmt-app
    container_name: open-genai-usermgmt-app
    environment:
      - RAG_API_KEY=${RAG_API_KEY:-local-rag-key}
      - KEYCLOAK_URL=${KEYCLOAK_INTERNAL_URL:-http://keycloak:8080}
      - KEYCLOAK_REALM=${KEYCLOAK_REALM:-open-genai}
      - KEYCLOAK_ADMIN=${KEYCLOAK_ADMIN:-admin}
      - KEYCLOAK_ADMIN_PASSWORD=${KEYCLOAK_ADMIN_PASSWORD:-admin}
    depends_on:
      - keycloak
    restart: unless-stopped

  # モデル利用制御を「AI アプリ」として提供（管理者限定）。
  # backend_data を共有し policy.db の唯一のライターとして動作（backend は読取専用）。
  modelpolicy-app:
    build: ./modelpolicy-app
    container_name: open-genai-modelpolicy-app
    environment:
      - RAG_API_KEY=${RAG_API_KEY:-local-rag-key}
      - POLICY_DB_PATH=/data/policy.db
    volumes:
      - backend_data:/data
    restart: unless-stopped

  # 入力制限(禁止ワード/機密情報)を「AI アプリ」として提供（管理者限定）。
  # backend_data を共有し ngwords.db の唯一のライターとして動作（backend は読取専用）。
  ngword-app:
    build: ./ngword-app
    container_name: open-genai-ngword-app
    environment:
      - RAG_API_KEY=${RAG_API_KEY:-local-rag-key}
      - NGWORD_DB_PATH=/data/ngwords.db
    volumes:
      - backend_data:/data
    restart: unless-stopped

  # プロンプトテンプレートを「AI アプリ」として提供（全ユーザー利用可）。
  prompt-app:
    build: ./prompt-app
    container_name: open-genai-prompt-app
    environment:
      - RAG_API_KEY=${RAG_API_KEY:-local-rag-key}
      - PROMPT_DB_PATH=/data/prompts.db
    volumes:
      - backend_data:/data
    restart: unless-stopped

  web:
    build:
      context: ./genai-web
      dockerfile: Dockerfile.local
    container_name: open-genai-web
    ports:
      - "5173:5173"
    environment:
      - VITE_USE_POLLING=true
    volumes:
      - ./genai-web:/app
      # ルート / 各ワークスペースの node_modules はバインドマウントで隠れないよう
      # 名前付きボリュームで保持する（イメージ内の内容で初期化される）。
      - web_node_modules:/app/node_modules
      - web_pkg_web_node_modules:/app/packages/web/node_modules
      - web_pkg_common_node_modules:/app/packages/common/node_modules
      - web_pkg_types_node_modules:/app/packages/types/node_modules
      - web_pkg_cdk_node_modules:/app/packages/cdk/node_modules
    depends_on:
      - backend
    restart: unless-stopped

  # 任意: Ollama もコンテナで動かす場合 (`docker compose --profile ollama up`)
  ollama:
    image: ollama/ollama:latest
    container_name: open-genai-ollama
    profiles: ["ollama"]
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped

volumes:
  backend_data:
  web_node_modules:
  web_pkg_web_node_modules:
  web_pkg_common_node_modules:
  web_pkg_types_node_modules:
  web_pkg_cdk_node_modules:
  qdrant_data:
  keycloak_data:
  whisper_cache:
  dify_app_data:
  rag_app_data:
  ollama_data:
